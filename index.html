<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>offer神楼 V2 · 投递管理驾驶舱</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #e8edf4;
      --text: #1f2d3d;
      --muted: #6c7f92;
      --primary: #e68a2e;
      --primary-dark: #c96f0e;
      --primary-soft: #fff3e6;
      --success: #1f9d63;
      --danger: #d9485f;
      --warning: #d4821c;
      --shadow: 0 18px 40px -20px rgba(15, 23, 42, 0.22);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .app {
      max-width: 1600px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 0 24px 28px;
      overflow: hidden;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
      padding: 24px 4px 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
    }

    .logo h1 {
      font-size: 1.9rem;
      line-height: 1.2;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .logo p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tab {
      border: none;
      background: #f2f5f9;
      color: #385066;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      transition: .2s ease;
    }

    .tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 8px 16px -10px rgba(230, 138, 46, 0.7);
    }

    .tab:hover:not(.active), .ghost-btn:hover, .outline-btn:hover, .action-btn:hover {
      transform: translateY(-1px);
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1.25fr 0.95fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .panel {
      background: #fbfcfe;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 18px;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title h2 {
      font-size: 1rem;
      font-weight: 800;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 10px;
      text-align: center;
      min-height: 94px;
    }

    .stat-card.special {
      background: var(--primary-soft);
      border-color: #ffd9ad;
    }

    .stat-number {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.15;
    }

    .stat-label {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
    }

    .todo-list {
      display: grid;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }

    .todo-item {
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      display: grid;
      gap: 6px;
    }

    .todo-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .todo-company {
      font-weight: 800;
    }

    .todo-badge {
      white-space: nowrap;
      font-size: 0.72rem;
      padding: 5px 8px;
      border-radius: 999px;
      background: #eef4ff;
      color: #315d9b;
      font-weight: 700;
    }

    .todo-meta, .todo-note {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      margin: 18px 0;
    }

    .toolbar-left, .toolbar-right {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .toolbar-right {
      background: #f8fbff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
    }

    .btn, .ghost-btn, .outline-btn, .action-btn, .tab, .link-btn, .tag, .sort-select, .filter-input, .filter-select {
      transition: .2s ease;
    }

    .btn, .ghost-btn, .outline-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      background: var(--primary);
      color: white;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .outline-btn {
      background: white;
      border: 1px solid #d8e1eb;
      color: #314759;
    }

    .ghost-btn {
      background: #f1f6fb;
      color: #314759;
    }

    .filter-input, .filter-select, .sort-select {
      border: 1px solid #dbe5ef;
      background: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.84rem;
      outline: none;
      min-width: 120px;
      color: var(--text);
    }

    .filter-input:focus, .filter-select:focus, .sort-select:focus,
    .modal input:focus, .modal select:focus, .modal textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(230, 138, 46, 0.12);
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: auto;
      background: white;
    }

    table {
      width: 100%;
      min-width: 1450px;
      border-collapse: collapse;
      font-size: 0.86rem;
    }

    th {
      text-align: left;
      background: #fbfdff;
      color: #355069;
      font-size: 0.8rem;
      font-weight: 800;
      padding: 15px 12px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #f0f4f8;
      vertical-align: middle;
    }

    tbody tr:hover {
      background: #fcfdff;
    }

    .company-cell {
      display: grid;
      gap: 6px;
    }

    .company-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .company-name {
      font-weight: 800;
      color: #18364a;
    }

    .sub-info {
      font-size: 0.76rem;
      color: var(--muted);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.72rem;
      font-weight: 800;
    }

    .tag.priority { background: #fff1e6; color: #b56312; }
    .tag.channel { background: #eef6ff; color: #2e5f9a; }

    .status-select {
      border: 1px solid #d9e4ef;
      background: #f8fbff;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 0.82rem;
      font-weight: 700;
      min-width: 124px;
    }

    .deadline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.76rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .deadline.overdue { background: #ffecee; color: #b42338; }
    .deadline.today { background: #fff3e5; color: #b7610f; }
    .deadline.soon { background: #eef5ff; color: #27579a; }
    .deadline.normal { background: #f4f6f8; color: #55697d; }

    .note-preview {
      max-width: 220px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: normal;
    }

    .link-btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff3e8;
      color: var(--primary-dark);
      font-weight: 800;
      white-space: nowrap;
    }

    .link-btn:hover {
      background: #ffe2c3;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .action-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid #dbe4ee;
      background: white;
      cursor: pointer;
      color: #6c8194;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .action-btn:hover {
      color: var(--primary-dark);
      border-color: #f0c48b;
      background: #fff8f1;
    }

    .empty {
      text-align: center;
      padding: 52px 24px;
      color: var(--muted);
    }

    .footer {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 0.78rem;
      color: #8ba0b3;
      text-align: center;
      line-height: 1.7;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.44);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-mask.active { display: flex; }

    .modal {
      width: 720px;
      max-width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.24);
      padding: 24px;
    }

    .modal h3 {
      font-size: 1.3rem;
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.84rem;
      font-weight: 800;
      color: #34495d;
    }

    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid #d6e1eb;
      border-radius: 16px;
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      background: white;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }


    .view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: 1px solid #dbe5ef;
      border-radius: 999px;
      padding: 4px;
    }

    .view-btn {
      border: none;
      background: transparent;
      color: #4c6479;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .view-btn.active {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .group-row {
      background: #fffaf4;
      cursor: pointer;
    }

    .group-row:hover {
      background: #fff5e9;
    }

    .group-cell {
      padding-top: 16px;
      padding-bottom: 16px;
    }

    .group-main {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .group-company {
      font-weight: 900;
      font-size: 0.98rem;
      color: #16354a;
    }

    .group-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid #f0dfc8;
      color: #735230;
      font-weight: 800;
      font-size: 0.75rem;
    }

    .caret-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid #edd8bc;
      background: white;
      color: #9a641d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .group-subrow td {
      background: #fff;
    }

    .group-subrow td:first-child {
      padding-left: 28px;
    }

    .job-indent {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .job-indent::before {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #f4d4aa;
      flex: 0 0 auto;
    }

    .muted-small {
      font-size: 0.76rem;
      color: var(--muted);
    }

    @media (max-width: 1080px) {
      .top-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      body { padding: 14px; }
      .app { padding: 0 14px 18px; border-radius: 22px; }
      .form-grid { grid-template-columns: 1fr; }
      .toolbar-right { border-radius: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="navbar">
      <div class="logo">
        <h1>🏯 offer神楼 V2.1</h1>
        <p>四季独立管理 · 同公司多岗位折叠显示 · 截止提醒 · 重点岗位追踪</p>
      </div>
      <div class="tabs" id="seasonTabs"></div>
    </div>

    <div class="top-grid">
      <section class="panel">
        <div class="panel-title">
          <h2>总览统计</h2>
          <span id="statsSubtitle">当前招聘季</span>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>待处理提醒</h2>
          <span>按截止时间和优先级排序</span>
        </div>
        <div class="todo-list" id="todoList"></div>
      </section>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn" id="addBtn"><i class="fa-solid fa-plus"></i> 添加投递</button>
        <button class="outline-btn" id="exportCurrentBtn"><i class="fa-solid fa-file-export"></i> 导出当前季 JSON</button>
        <button class="outline-btn" id="exportAllBtn"><i class="fa-solid fa-box-archive"></i> 导出全部数据 JSON</button>
        <label class="outline-btn" for="importCurrentInput"><i class="fa-solid fa-file-import"></i> 导入当前季</label>
        <input id="importCurrentInput" type="file" accept=".json" hidden />
      </div>

      <div class="toolbar-right">
        <input class="filter-input" id="filterCompany" type="text" placeholder="公司 / 岗位 / 备注" />
        <select class="filter-select" id="filterStatus"></select>
        <select class="filter-select" id="filterPriority"></select>
        <select class="filter-select" id="filterCity"></select>
        <select class="sort-select" id="sortSelect">
          <option value="deadlineAsc">按截止时间</option>
          <option value="modifiedDesc">按最近修改</option>
          <option value="companyAsc">按公司名称</option>
        </select>
        <div class="view-toggle" id="viewToggle">
          <button class="view-btn active" type="button" data-view="grouped">按公司分组</button>
          <button class="view-btn" type="button" data-view="flat">普通列表</button>
        </div>
        <button class="ghost-btn" id="applyFilterBtn"><i class="fa-solid fa-magnifying-glass"></i> 筛选</button>
        <button class="ghost-btn" id="resetFilterBtn"><i class="fa-solid fa-rotate-left"></i> 重置</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>公司 / 标签</th>
            <th>进度</th>
            <th>岗位</th>
            <th>下一步动作</th>
            <th>截止时间</th>
            <th>地点</th>
            <th>链接</th>
            <th>最近修改</th>
            <th>备注</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td class="empty" colspan="10">加载中...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="footer">
      本地数据默认保存到浏览器 localStorage。建议同时使用“导出全部数据 JSON”备份到 GitHub 仓库或云盘。<br />
      页面适合直接部署到 GitHub Pages，打开即用，不依赖后端。
    </div>
  </div>

  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <h3 id="modalTitle">添加投递记录</h3>
      <form id="recordForm">
        <input type="hidden" id="recordId" />
        <div class="form-grid">
          <div class="field">
            <label for="companyName">公司名称 *</label>
            <input id="companyName" type="text" required />
          </div>
          <div class="field">
            <label for="jobPosition">投递岗位</label>
            <input id="jobPosition" type="text" placeholder="例如：大客户销售实习生" />
          </div>

          <div class="field">
            <label for="progressStatus">投递进度</label>
            <select id="progressStatus"></select>
          </div>
          <div class="field">
            <label for="nextAction">下一步动作</label>
            <input id="nextAction" type="text" placeholder="例如：今晚投递 / 周三笔试 / 等 HR 回复" />
          </div>

          <div class="field">
            <label for="deadline">截止时间</label>
            <input id="deadline" type="datetime-local" />
          </div>
          <div class="field">
            <label for="location">工作地点</label>
            <input id="location" type="text" placeholder="北京 / 武汉 / 杭州" />
          </div>

          <div class="field">
            <label for="priority">优先级</label>
            <select id="priority">
              <option value="普通">普通</option>
              <option value="重点">重点</option>
              <option value="冲刺">冲刺</option>
            </select>
          </div>
          <div class="field">
            <label for="channel">投递渠道</label>
            <select id="channel">
              <option value="官网">官网</option>
              <option value="内推">内推</option>
              <option value="牛客">牛客</option>
              <option value="Boss">Boss</option>
              <option value="招聘公众号">招聘公众号</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <div class="field full">
            <label for="relatedLink">投递链接</label>
            <input id="relatedLink" type="url" placeholder="https://..." />
          </div>
          <div class="field full">
            <label for="jobAnnouncementLink">招聘公告链接</label>
            <input id="jobAnnouncementLink" type="url" placeholder="https://..." />
          </div>
          <div class="field full">
            <label for="notes">备注 / 面试复盘</label>
            <textarea id="notes" placeholder="写面经、提醒、联系人、你的判断都可以"></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="outline-btn" id="cancelBtn">取消</button>
          <button type="submit" class="btn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'offerRecruitDataV4';
    const SEASONS = {
      daily: '日常实习',
      summer: '暑期实习',
      autumn: '秋招',
      spring: '春招'
    };

    const STATUS_LIST = [
      '待投递',
      '已投递',
      '简历筛选中',
      '已笔试',
      '笔试通过',
      'HR面',
      '一面',
      '二面',
      '三面/终面',
      'Offer',
      '已OC/待入职',
      '已挂',
      '已放弃'
    ];

    const state = {
      currentSeason: 'daily',
      filter: {
        keyword: '',
        status: '',
        priority: '',
        city: '',
        sort: 'deadlineAsc',
        viewMode: 'grouped'
      },
      expandedCompanies: {},
      data: {
        daily: [],
        summer: [],
        autumn: [],
        spring: []
      }
    };

    const modalMask = document.getElementById('modalMask');
    const recordForm = document.getElementById('recordForm');
    const tableBody = document.getElementById('tableBody');
    const statsGrid = document.getElementById('statsGrid');
    const todoList = document.getElementById('todoList');

    const formEls = {
      id: document.getElementById('recordId'),
      companyName: document.getElementById('companyName'),
      jobPosition: document.getElementById('jobPosition'),
      progressStatus: document.getElementById('progressStatus'),
      nextAction: document.getElementById('nextAction'),
      deadline: document.getElementById('deadline'),
      location: document.getElementById('location'),
      priority: document.getElementById('priority'),
      channel: document.getElementById('channel'),
      relatedLink: document.getElementById('relatedLink'),
      jobAnnouncementLink: document.getElementById('jobAnnouncementLink'),
      notes: document.getElementById('notes')
    };

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function safeUrl(url) {
      if (!url) return '';
      try {
        const parsed = new URL(url);
        if (parsed.protocol === 'http:' || parsed.protocol === 'https:') return parsed.href;
        return '';
      } catch {
        return '';
      }
    }

    function formatDateTime(isoString) {
      if (!isoString) return '—';
      const d = new Date(isoString);
      if (Number.isNaN(d.getTime())) return '—';
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${y}-${m}-${day} ${h}:${min}`;
    }

    function toLocalInputValue(isoString) {
      if (!isoString) return '';
      const d = new Date(isoString);
      if (Number.isNaN(d.getTime())) return '';
      const offset = d.getTimezoneOffset();
      const local = new Date(d.getTime() - offset * 60000);
      return local.toISOString().slice(0, 16);
    }

    function fromLocalInputValue(value) {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '';
      return d.toISOString();
    }

    function createEmptyData() {
      return { daily: [], summer: [], autumn: [], spring: [] };
    }

    function normalizeRecord(raw = {}) {
      const validStatus = STATUS_LIST.includes(raw.progressStatus) ? raw.progressStatus : '待投递';
      return {
        id: raw.id || Date.now() + Math.floor(Math.random() * 1000),
        companyName: String(raw.companyName || '').trim(),
        jobPosition: String(raw.jobPosition || '').trim(),
        progressStatus: validStatus,
        nextAction: String(raw.nextAction || '').trim(),
        deadline: raw.deadline || '',
        location: String(raw.location || '').trim(),
        priority: ['普通', '重点', '冲刺'].includes(raw.priority) ? raw.priority : '普通',
        channel: String(raw.channel || '官网').trim() || '官网',
        relatedLink: safeUrl(String(raw.relatedLink || '').trim()),
        jobAnnouncementLink: safeUrl(String(raw.jobAnnouncementLink || '').trim()),
        notes: String(raw.notes || '').trim(),
        modifyTime: raw.modifyTime || new Date().toISOString()
      };
    }

    function loadData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) {
        state.data = createEmptyData();
        persistAll();
        return;
      }
      try {
        const parsed = JSON.parse(stored);
        const base = createEmptyData();
        Object.keys(base).forEach(key => {
          base[key] = Array.isArray(parsed[key]) ? parsed[key].map(normalizeRecord) : [];
        });
        state.data = base;
      } catch {
        state.data = createEmptyData();
        persistAll();
      }
    }

    function persistAll() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }

    function getCurrentData() {
      return state.data[state.currentSeason] || [];
    }

    function saveCurrentData(list) {
      state.data[state.currentSeason] = list.map(normalizeRecord);
      persistAll();
      renderAll();
    }

    function getStatusColorClass(deadline) {
      if (!deadline) return 'normal';
      const now = Date.now();
      const target = new Date(deadline).getTime();
      if (Number.isNaN(target)) return 'normal';
      const diff = target - now;
      const day = 24 * 60 * 60 * 1000;
      if (diff < 0) return 'overdue';
      if (diff < day) return 'today';
      if (diff < 3 * day) return 'soon';
      return 'normal';
    }

    function getDeadlineText(deadline) {
      if (!deadline) return '未设置';
      const target = new Date(deadline).getTime();
      if (Number.isNaN(target)) return '未设置';
      const diff = target - Date.now();
      const day = 24 * 60 * 60 * 1000;
      if (diff < 0) return '已截止';
      if (diff < day) return '今天到期';
      const days = Math.ceil(diff / day);
      return `${days} 天后`; 
    }

    function isActiveStatus(status) {
      return !['已挂', '已放弃', '已OC/待入职'].includes(status);
    }

    function computeStats() {
      const list = getCurrentData();
      const stats = {
        total: list.length,
        active: list.filter(item => isActiveStatus(item.progressStatus)).length,
        deadlineSoon: list.filter(item => ['today', 'soon', 'overdue'].includes(getStatusColorClass(item.deadline)) && isActiveStatus(item.progressStatus)).length,
        offer: list.filter(item => item.progressStatus === 'Offer' || item.progressStatus === '已OC/待入职').length,
        rejected: list.filter(item => item.progressStatus === '已挂').length,
        focus: list.filter(item => item.priority === '重点' || item.priority === '冲刺').length
      };
      return stats;
    }

    function renderStats() {
      document.getElementById('statsSubtitle').textContent = `${SEASONS[state.currentSeason]} · ${new Date().toLocaleDateString('zh-CN')}`;
      const stats = computeStats();
      const cards = [
        ['总记录', stats.total, 'special'],
        ['进行中', stats.active, ''],
        ['临近截止', stats.deadlineSoon, ''],
        ['Offer/OC', stats.offer, ''],
        ['已挂', stats.rejected, ''],
        ['重点岗位', stats.focus, '']
      ];
      statsGrid.innerHTML = cards.map(([label, value, extra]) => `
        <div class="stat-card ${extra}">
          <div class="stat-number">${value}</div>
          <div class="stat-label">${label}</div>
        </div>
      `).join('');
    }

    function getFilteredData() {
      const keyword = state.filter.keyword.trim().toLowerCase();
      let list = [...getCurrentData()];

      if (keyword) {
        list = list.filter(item => {
          const merged = [item.companyName, item.jobPosition, item.notes, item.nextAction].join(' ').toLowerCase();
          return merged.includes(keyword);
        });
      }
      if (state.filter.status) {
        list = list.filter(item => item.progressStatus === state.filter.status);
      }
      if (state.filter.priority) {
        list = list.filter(item => item.priority === state.filter.priority);
      }
      if (state.filter.city) {
        list = list.filter(item => item.location === state.filter.city);
      }

      switch (state.filter.sort) {
        case 'modifiedDesc':
          list.sort((a, b) => new Date(b.modifyTime) - new Date(a.modifyTime));
          break;
        case 'companyAsc':
          list.sort((a, b) => a.companyName.localeCompare(b.companyName, 'zh-CN'));
          break;
        case 'deadlineAsc':
        default:
          list.sort((a, b) => {
            const at = a.deadline ? new Date(a.deadline).getTime() : Number.POSITIVE_INFINITY;
            const bt = b.deadline ? new Date(b.deadline).getTime() : Number.POSITIVE_INFINITY;
            if (at !== bt) return at - bt;
            return new Date(b.modifyTime) - new Date(a.modifyTime);
          });
      }
      return list;
    }

    function renderTodoList() {
      const urgentList = getCurrentData()
        .filter(item => isActiveStatus(item.progressStatus) && (item.nextAction || item.deadline || item.priority !== '普通'))
        .sort((a, b) => {
          const pa = a.priority === '冲刺' ? 0 : a.priority === '重点' ? 1 : 2;
          const pb = b.priority === '冲刺' ? 0 : b.priority === '重点' ? 1 : 2;
          if (pa !== pb) return pa - pb;
          const at = a.deadline ? new Date(a.deadline).getTime() : Number.POSITIVE_INFINITY;
          const bt = b.deadline ? new Date(b.deadline).getTime() : Number.POSITIVE_INFINITY;
          return at - bt;
        })
        .slice(0, 8);

      if (!urgentList.length) {
        todoList.innerHTML = '<div class="todo-item"><div class="todo-meta">当前没有需要特别处理的记录。你可以给重点岗位设置截止时间或下一步动作。</div></div>';
        return;
      }

      todoList.innerHTML = urgentList.map(item => `
        <div class="todo-item">
          <div class="todo-top">
            <div class="todo-company">${escapeHtml(item.companyName)} · ${escapeHtml(item.jobPosition || '未填写岗位')}</div>
            <span class="todo-badge">${escapeHtml(item.priority)}</span>
          </div>
          <div class="todo-meta">${escapeHtml(item.progressStatus)} · ${escapeHtml(item.location || '地点未填')} · ${item.deadline ? formatDateTime(item.deadline) : '未设截止时间'}</div>
          <div class="todo-note">${escapeHtml(item.nextAction || '暂未写下一步动作')}</div>
        </div>
      `).join('');
    }


    function getPriorityRank(priority) {
      if (priority === '冲刺') return 0;
      if (priority === '重点') return 1;
      return 2;
    }

    function getStatusDepth(status) {
      const idx = STATUS_LIST.indexOf(status);
      return idx === -1 ? 0 : idx;
    }

    function summarizeCompany(records) {
      const sorted = [...records].sort((a, b) => {
        const depthDiff = getStatusDepth(b.progressStatus) - getStatusDepth(a.progressStatus);
        if (depthDiff) return depthDiff;
        const priorityDiff = getPriorityRank(a.priority) - getPriorityRank(b.priority);
        if (priorityDiff) return priorityDiff;
        return new Date(b.modifyTime) - new Date(a.modifyTime);
      });

      const deepest = sorted[0]?.progressStatus || '待投递';
      const activeCount = records.filter(item => isActiveStatus(item.progressStatus)).length;
      const focusCount = records.filter(item => item.priority !== '普通').length;
      const todoCount = records.filter(item => item.nextAction || (item.deadline && ['today', 'soon', 'overdue'].includes(getStatusColorClass(item.deadline)))).length;
      const earliestDeadlineItem = [...records]
        .filter(item => item.deadline && isActiveStatus(item.progressStatus))
        .sort((a, b) => new Date(a.deadline) - new Date(b.deadline))[0];

      const statusMap = {};
      records.forEach(item => {
        statusMap[item.progressStatus] = (statusMap[item.progressStatus] || 0) + 1;
      });

      const statusSummary = Object.entries(statusMap)
        .sort((a, b) => getStatusDepth(b[0]) - getStatusDepth(a[0]))
        .slice(0, 3)
        .map(([status, count]) => `${status}(${count})`)
        .join(' / ');

      return {
        deepest,
        activeCount,
        focusCount,
        todoCount,
        earliestDeadlineText: earliestDeadlineItem ? formatDateTime(earliestDeadlineItem.deadline) : '未设置',
        earliestDeadlineClass: earliestDeadlineItem ? getStatusColorClass(earliestDeadlineItem.deadline) : 'normal',
        statusSummary
      };
    }

    function groupByCompany(list) {
      const map = new Map();
      list.forEach(item => {
        const key = item.companyName || '未命名公司';
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
      });

      return [...map.entries()].map(([company, records]) => {
        const sortedRecords = [...records].sort((a, b) => {
          const pa = getPriorityRank(a.priority);
          const pb = getPriorityRank(b.priority);
          if (pa !== pb) return pa - pb;
          const da = a.deadline ? new Date(a.deadline).getTime() : Number.POSITIVE_INFINITY;
          const db = b.deadline ? new Date(b.deadline).getTime() : Number.POSITIVE_INFINITY;
          if (da !== db) return da - db;
          const sa = getStatusDepth(b.progressStatus) - getStatusDepth(a.progressStatus);
          if (sa !== 0) return sa;
          return new Date(b.modifyTime) - new Date(a.modifyTime);
        });
        return { company, records: sortedRecords, summary: summarizeCompany(sortedRecords) };
      }).sort((a, b) => {
        const da = a.records.find(item => item.deadline)?.deadline ? new Date(a.records.find(item => item.deadline).deadline).getTime() : Number.POSITIVE_INFINITY;
        const db = b.records.find(item => item.deadline)?.deadline ? new Date(b.records.find(item => item.deadline).deadline).getTime() : Number.POSITIVE_INFINITY;
        if (state.filter.sort === 'companyAsc') return a.company.localeCompare(b.company, 'zh-CN');
        if (state.filter.sort === 'modifiedDesc') {
          const am = Math.max(...a.records.map(item => new Date(item.modifyTime).getTime()));
          const bm = Math.max(...b.records.map(item => new Date(item.modifyTime).getTime()));
          return bm - am;
        }
        if (da !== db) return da - db;
        return a.company.localeCompare(b.company, 'zh-CN');
      });
    }

    function renderRecordRow(item, grouped = false) {
      const deadlineClass = getStatusColorClass(item.deadline);
      const deadlineText = item.deadline ? `${formatDateTime(item.deadline)} · ${getDeadlineText(item.deadline)}` : '未设置';
      const noteText = item.notes || '暂无备注';
      return `
        <tr class="${grouped ? 'group-subrow' : ''}" data-id="${item.id}">
          <td>
            ${grouped ? `
              <div class="job-indent">
                <div>
                  <div class="company-name">${escapeHtml(item.jobPosition || '未填写岗位')}</div>
                  <div class="muted-small">${escapeHtml(item.companyName)}</div>
                </div>
              </div>
            ` : `
              <div class="company-cell">
                <div class="company-row">
                  <span class="company-name">${escapeHtml(item.companyName)}</span>
                  ${item.priority !== '普通' ? `<span class="tag priority"><i class="fa-solid fa-flag"></i>${escapeHtml(item.priority)}</span>` : ''}
                  <span class="tag channel"><i class="fa-solid fa-paper-plane"></i>${escapeHtml(item.channel)}</span>
                </div>
                <div class="sub-info">${escapeHtml(item.jobPosition || '未填写岗位')}</div>
              </div>
            `}
          </td>
          <td>
            <select class="status-select" data-role="status" data-id="${item.id}">
              ${STATUS_LIST.map(status => `<option value="${status}" ${item.progressStatus === status ? 'selected' : ''}>${status}</option>`).join('')}
            </select>
          </td>
          <td>${escapeHtml(item.jobPosition || '—')}</td>
          <td>${escapeHtml(item.nextAction || '—')}</td>
          <td><span class="deadline ${deadlineClass}">${escapeHtml(deadlineText)}</span></td>
          <td>
            <div>${escapeHtml(item.location || '—')}</div>
            <div class="muted-small">${item.priority !== '普通' ? escapeHtml(item.priority) : '普通'} · ${escapeHtml(item.channel || '官网')}</div>
          </td>
          <td>
            <div style="display:grid;gap:8px;">
              ${createLinkCell(item.relatedLink, '投递', 'fa-solid fa-up-right-from-square')}
              ${createLinkCell(item.jobAnnouncementLink, '公告', 'fa-regular fa-file-lines')}
            </div>
          </td>
          <td>${escapeHtml(formatDateTime(item.modifyTime))}</td>
          <td><div class="note-preview" title="${escapeHtml(noteText)}">${escapeHtml(noteText)}</div></td>
          <td>
            <div class="action-buttons">
              <button class="action-btn" data-role="copy" data-id="${item.id}" title="复制"><i class="fa-regular fa-copy"></i></button>
              <button class="action-btn" data-role="edit" data-id="${item.id}" title="编辑"><i class="fa-regular fa-pen-to-square"></i></button>
              <button class="action-btn" data-role="delete" data-id="${item.id}" title="删除"><i class="fa-regular fa-trash-can"></i></button>
            </div>
          </td>
        </tr>
      `;
    }

    function createLinkCell(url, text, icon) {
      const valid = safeUrl(url);
      if (!valid) return '—';
      return `<a class="link-btn" href="${valid}" target="_blank" rel="noopener noreferrer"><i class="${icon}"></i>${text}</a>`;
    }

    function renderTable() {
      const list = getFilteredData();
      const isGrouped = (state.filter.viewMode || 'grouped') === 'grouped';

      if (!list.length) {
        tableBody.innerHTML = '<tr><td class="empty" colspan="10">暂无匹配结果。你可以重置筛选，或添加第一条投递记录。</td></tr>';
        return;
      }

      if (!isGrouped) {
        tableBody.innerHTML = list.map(item => renderRecordRow(item, false)).join('');
        return;
      }

      const groups = groupByCompany(list);
      const html = [];

      groups.forEach(group => {
        const companyKey = String(group.company || '未命名公司');
        const isExpanded = state.expandedCompanies[companyKey] !== false;

        html.push(`
          <tr class="group-row" data-role="toggle-group" data-company="${escapeHtml(companyKey)}">
            <td class="group-cell" colspan="10">
              <div class="group-main">
                <span class="caret-btn"><i class="fa-solid ${isExpanded ? 'fa-chevron-down' : 'fa-chevron-right'}"></i></span>
                <span class="group-company">${escapeHtml(companyKey)}</span>
                <span class="summary-chip"><i class="fa-solid fa-layer-group"></i>${group.records.length} 个岗位</span>
                <span class="summary-chip"><i class="fa-solid fa-stairs"></i>最深进度：${escapeHtml(group.summary.deepest)}</span>
                ${group.summary.focusCount ? `<span class="summary-chip"><i class="fa-solid fa-flag"></i>${group.summary.focusCount} 个重点</span>` : ''}
                ${group.summary.todoCount ? `<span class="summary-chip"><i class="fa-solid fa-bolt"></i>${group.summary.todoCount} 个待处理</span>` : ''}
                <span class="summary-chip"><i class="fa-regular fa-clock"></i>最近截止：<span class="deadline ${group.summary.earliestDeadlineClass}" style="padding:2px 8px;">${escapeHtml(group.summary.earliestDeadlineText)}</span></span>
              </div>
              <div class="group-meta">
                <span>${escapeHtml(group.summary.statusSummary || '暂无状态')}</span>
                <span>·</span>
                <span>进行中 ${group.summary.activeCount} 个</span>
              </div>
            </td>
          </tr>
        `);

        if (isExpanded) {
          group.records.forEach(item => {
            html.push(renderRecordRow(item, true));
          });
        }
      });

      tableBody.innerHTML = html.join('');
    }

    function renderSeasonTabs() {
      const box = document.getElementById('seasonTabs');
      box.innerHTML = Object.entries(SEASONS).map(([key, label]) => `
        <button class="tab ${key === state.currentSeason ? 'active' : ''}" data-season="${key}">${label}</button>
      `).join('');
    }

    function renderFilterOptions() {
      const statusSelect = document.getElementById('filterStatus');
      const prioritySelect = document.getElementById('filterPriority');
      const citySelect = document.getElementById('filterCity');

      statusSelect.innerHTML = '<option value="">全部进度</option>' + STATUS_LIST.map(s => `<option value="${s}">${s}</option>`).join('');
      prioritySelect.innerHTML = `
        <option value="">全部优先级</option>
        <option value="普通">普通</option>
        <option value="重点">重点</option>
        <option value="冲刺">冲刺</option>
      `;

      const cities = [...new Set(getCurrentData().map(item => item.location).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
      citySelect.innerHTML = '<option value="">全部地点</option>' + cities.map(city => `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`).join('');

      statusSelect.value = state.filter.status;
      prioritySelect.value = state.filter.priority;
      citySelect.value = state.filter.city;
      document.getElementById('sortSelect').value = state.filter.sort;
      document.getElementById('filterCompany').value = state.filter.keyword;
      document.querySelectorAll('#viewToggle .view-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === state.filter.viewMode);
      });
    }

    function renderAll() {
      renderSeasonTabs();
      renderStats();
      renderFilterOptions();
      renderTodoList();
      renderTable();
    }

    function openModal(record = null, isCopy = false) {
      document.getElementById('modalTitle').textContent = record ? (isCopy ? '复制投递记录' : '编辑投递记录') : '添加投递记录';
      formEls.progressStatus.innerHTML = STATUS_LIST.map(status => `<option value="${status}">${status}</option>`).join('');

      if (record) {
        formEls.id.value = isCopy ? '' : record.id;
        formEls.companyName.value = record.companyName || '';
        formEls.jobPosition.value = record.jobPosition || '';
        formEls.progressStatus.value = record.progressStatus || '待投递';
        formEls.nextAction.value = record.nextAction || '';
        formEls.deadline.value = toLocalInputValue(record.deadline);
        formEls.location.value = record.location || '';
        formEls.priority.value = record.priority || '普通';
        formEls.channel.value = record.channel || '官网';
        formEls.relatedLink.value = record.relatedLink || '';
        formEls.jobAnnouncementLink.value = record.jobAnnouncementLink || '';
        formEls.notes.value = record.notes || '';
      } else {
        formEls.id.value = '';
        formEls.companyName.value = '';
        formEls.jobPosition.value = '';
        formEls.progressStatus.value = '待投递';
        formEls.nextAction.value = '';
        formEls.deadline.value = '';
        formEls.location.value = '';
        formEls.priority.value = '普通';
        formEls.channel.value = '官网';
        formEls.relatedLink.value = '';
        formEls.jobAnnouncementLink.value = '';
        formEls.notes.value = '';
      }
      modalMask.classList.add('active');
    }

    function closeModal() {
      modalMask.classList.remove('active');
      recordForm.reset();
    }

    function handleFormSubmit(event) {
      event.preventDefault();
      const companyName = formEls.companyName.value.trim();
      if (!companyName) {
        alert('公司名称不能为空');
        return;
      }

      const payload = normalizeRecord({
        id: formEls.id.value ? Number(formEls.id.value) : undefined,
        companyName,
        jobPosition: formEls.jobPosition.value,
        progressStatus: formEls.progressStatus.value,
        nextAction: formEls.nextAction.value,
        deadline: fromLocalInputValue(formEls.deadline.value),
        location: formEls.location.value,
        priority: formEls.priority.value,
        channel: formEls.channel.value,
        relatedLink: formEls.relatedLink.value,
        jobAnnouncementLink: formEls.jobAnnouncementLink.value,
        notes: formEls.notes.value,
        modifyTime: new Date().toISOString()
      });

      const list = [...getCurrentData()];
      const idx = list.findIndex(item => item.id === payload.id);
      if (idx >= 0) list[idx] = payload;
      else list.push(payload);

      saveCurrentData(list);
      closeModal();
    }

    function exportJson(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importCurrentSeason(file) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!Array.isArray(parsed)) throw new Error('当前季导入文件必须是数组');
          saveCurrentData(parsed.map(normalizeRecord));
          alert(`已成功导入 ${parsed.length} 条记录到 ${SEASONS[state.currentSeason]}`);
        } catch (error) {
          alert('导入失败：JSON 格式不正确，或文件结构不是数组。');
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function switchSeason(season) {
      state.currentSeason = season;
      state.expandedCompanies = {};
      state.filter = { keyword: '', status: '', priority: '', city: '', sort: 'deadlineAsc', viewMode: state.filter.viewMode || 'grouped' };
      renderAll();
    }

    function applyFilter() {
      state.filter.keyword = document.getElementById('filterCompany').value.trim();
      state.filter.status = document.getElementById('filterStatus').value;
      state.filter.priority = document.getElementById('filterPriority').value;
      state.filter.city = document.getElementById('filterCity').value;
      state.filter.sort = document.getElementById('sortSelect').value;
      renderTable();
    }

    function resetFilter() {
      state.filter = { keyword: '', status: '', priority: '', city: '', sort: 'deadlineAsc', viewMode: state.filter.viewMode || 'grouped' };
      renderAll();
    }

    function handleTableClick(event) {
      const actionEl = event.target.closest('[data-role]');
      if (!actionEl) return;
      const role = actionEl.dataset.role;

      if (role === 'toggle-group') {
        const company = actionEl.dataset.company || '';
        state.expandedCompanies[company] = !(state.expandedCompanies[company] !== false);
        renderTable();
        return;
      }

      const id = Number(actionEl.dataset.id);
      const list = [...getCurrentData()];
      const record = list.find(item => item.id === id);
      if (!record) return;

      if (role === 'edit') {
        openModal(record, false);
      } else if (role === 'copy') {
        openModal(record, true);
      } else if (role === 'delete') {
        if (!confirm(`确定删除 ${record.companyName} 这条记录吗？`)) return;
        saveCurrentData(list.filter(item => item.id !== id));
      }
    }

    function handleTableChange(event) {
      const select = event.target.closest('[data-role="status"]');
      if (!select) return;
      const id = Number(select.dataset.id);
      const list = [...getCurrentData()];
      const idx = list.findIndex(item => item.id === id);
      if (idx < 0) return;
      list[idx].progressStatus = select.value;
      list[idx].modifyTime = new Date().toISOString();
      saveCurrentData(list);
    }

    function bindEvents() {
      document.getElementById('addBtn').addEventListener('click', () => openModal());
      document.getElementById('cancelBtn').addEventListener('click', closeModal);
      modalMask.addEventListener('click', e => { if (e.target === modalMask) closeModal(); });
      recordForm.addEventListener('submit', handleFormSubmit);

      document.getElementById('exportCurrentBtn').addEventListener('click', () => {
        exportJson(`${state.currentSeason}_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.json`, getCurrentData());
      });

      document.getElementById('exportAllBtn').addEventListener('click', () => {
        exportJson(`offer-shenlou-all_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.json`, state.data);
      });

      document.getElementById('importCurrentInput').addEventListener('change', e => {
        const file = e.target.files?.[0];
        if (file) importCurrentSeason(file);
        e.target.value = '';
      });

      document.getElementById('applyFilterBtn').addEventListener('click', applyFilter);
      document.getElementById('resetFilterBtn').addEventListener('click', resetFilter);
      document.getElementById('sortSelect').addEventListener('change', applyFilter);
      document.getElementById('viewToggle').addEventListener('click', e => {
        const btn = e.target.closest('[data-view]');
        if (!btn) return;
        state.filter.viewMode = btn.dataset.view;
        renderFilterOptions();
        renderTable();
      });

      document.getElementById('seasonTabs').addEventListener('click', e => {
        const button = e.target.closest('[data-season]');
        if (!button) return;
        switchSeason(button.dataset.season);
      });

      tableBody.addEventListener('click', handleTableClick);
      tableBody.addEventListener('change', handleTableChange);
    }

    function init() {
      loadData();
      bindEvents();
      renderAll();
    }

    init();
  </script>
</body>
</html>
